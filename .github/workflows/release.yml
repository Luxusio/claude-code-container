name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/claude-code-container:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/claude-code-container:${{ steps.version.outputs.version }}
          labels: |
            cli.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm-publish:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version from tag
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Determine npm tag
        id: npm-tag
        run: |
          LATEST=$(npm view claude-code-container version 2>/dev/null || echo "0.0.0")
          TAG=$(node scripts/determine-npm-tag.js "${{ steps.version.outputs.version }}" "$LATEST")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ""

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:master

  docker-test:
    runs-on: ubuntu-latest
    needs: docker-build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests inside ccc container
        run: |
          docker run --rm \
            -e MISE_TRUSTED_CONFIG_PATHS=/workspace \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ secrets.DOCKERHUB_USERNAME }}/claude-code-container:${{ steps.version.outputs.version }} \
            bash -c "npm run build && npx vitest run src/__tests__/chrome-devtools-integration.test.ts"
